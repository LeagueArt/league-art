<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0.15">
      <stop offset="0" stop-color="#83868a"/>
      <stop offset="0.14" stop-color="#c6c9cd"/>
      <stop offset="0.28" stop-color="#9a9da1"/>
      <stop offset="0.5" stop-color="#d3d6da"/>
      <stop offset="0.72" stop-color="#9fa2a6"/>
      <stop offset="0.86" stop-color="#c9ccd0"/>
      <stop offset="1" stop-color="#83868a"/>
    </linearGradient>
    <linearGradient id="lightTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="0.7" stop-color="#4c4f53" stop-opacity="0"/>
      <stop offset="1" stop-color="#3f4246" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e5231b" stop-opacity="0.65"/>
      <stop offset="0.45" stop-color="#bf0906" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#bf0906" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ring" cx="0.5" cy="0.35" r="0.78">
      <stop offset="0" stop-color="#e4e7ea"/>
      <stop offset="0.55" stop-color="#9c9fa3"/>
      <stop offset="0.82" stop-color="#74777b"/>
      <stop offset="1" stop-color="#b6b9bd"/>
    </radialGradient>
    <radialGradient id="btn" cx="0.4" cy="0.32" r="0.82">
      <stop offset="0" stop-color="#e64a3d"/>
      <stop offset="0.32" stop-color="#cf130d"/>
      <stop offset="0.7" stop-color="#bf0906"/>
      <stop offset="1" stop-color="#6a0301"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#2b2e32" stop-opacity="0.4"/>
    </radialGradient>
    <pattern id="brush" width="3" height="1" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" fill-opacity="0"/>
      <rect width="1" height="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="softBig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- 금속 배경 -->
  <rect width="1440" height="900" fill="url(#metal)"/>
  <rect width="1440" height="900" fill="url(#brush)"/>

  <!-- 엘리베이터 도어 이음새 -->
  <rect x="718" y="0" width="4" height="900" fill="#63666a" opacity="0.45"/>
  <rect x="716" y="0" width="2" height="900" fill="#ffffff" opacity="0.15"/>

  <!-- 상단 라이트 / 하단 음영 -->
  <rect width="1440" height="900" fill="url(#lightTop)"/>
  <!-- 가장자리 비네트(깊이감) -->
  <rect width="1440" height="900" fill="url(#vignette)"/>

  <!-- 버튼 아래 붉은 반사 스트릭 -->
  <rect x="716" y="430" width="8" height="360" fill="#c21b12" opacity="0.55" filter="url(#soft)"/>

  <!-- 버튼 글로우(블룸) -->
  <circle cx="720" cy="360" r="210" fill="url(#glow)" filter="url(#softBig)"/>

  <!-- 함몰 링 -->
  <circle cx="720" cy="360" r="132" fill="url(#ring)"/>
  <circle cx="720" cy="360" r="132" fill="none" stroke="#5f6266" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="720" cy="360" r="98" fill="#7f8286" opacity="0.5"/>

  <!-- 빨간 버튼 -->
  <circle cx="720" cy="360" r="92" fill="url(#btn)"/>
  <circle cx="720" cy="360" r="92" fill="none" stroke="#5a0402" stroke-opacity="0.35" stroke-width="2"/>
  <!-- 광택 하이라이트(절제) -->
  <ellipse cx="700" cy="330" rx="44" ry="24" fill="#ffffff" opacity="0.16" filter="url(#soft)"/>
</svg>
